name: build

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: feo-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: feo-linux-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: feo-darwin-x64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: feo-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Read bun version
        id: bun-version
        run: echo "version=$(jq -r '.packageManager | ltrimstr("bun@")' package.json)" >> "$GITHUB_OUTPUT"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ steps.bun-version.outputs.version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install opentui native bindings
        run: |
          VERSION=$(grep -m1 -oE '"@opentui/core@[^"]+"' bun.lock | sed -E 's/^"@opentui\/core@//;s/"$//')
          bun install --os="*" --cpu="*" "@opentui/core@$VERSION"

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run fmt:check

      - name: Type check
        run: bun run check

      - name: Test
        run: bun run test

      - name: Set version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          sed -i.bak "s/\"0\.0\.0-dev\"/\"$VERSION\"/" src/lib/version.ts
          rm -f src/lib/version.ts.bak

      - name: Build
        run: bun build --compile --target=${{ matrix.target }} --outfile=dist/${{ matrix.artifact }} src/index.ts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

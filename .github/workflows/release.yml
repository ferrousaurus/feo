name: release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: feo-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: feo-linux-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: feo-darwin-x64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: feo-darwin-arm64

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Read bun version
        id: bun-version
        run: echo "version=$(jq -r '.packageManager | ltrimstr("bun@")' package.json)" >> "$GITHUB_OUTPUT"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ steps.bun-version.outputs.version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install opentui native bindings
        run: |
          VERSION=$(grep -m1 -oE '"@opentui/core@[^"]+"' bun.lock | sed -E 's/^"@opentui\/core@//;s/"$//')
          bun install --os="*" --cpu="*" "@opentui/core@$VERSION"

      - name: Set version
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${TAG#v}"
          sed -i.bak "s/\"0\.0\.0-dev\"/\"$VERSION\"/" src/lib/version.ts
          rm -f src/lib/version.ts.bak

      - name: Build
        run: bun build --compile --target=${{ matrix.target }} --outfile=dist/${{ matrix.artifact }} src/index.ts

      - name: Checksum
        run: sha256sum dist/${{ matrix.artifact }} > dist/${{ matrix.artifact }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.artifact }}.sha256
          if-no-files-found: error

  attach:
    name: attach
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download linux-x64
        uses: actions/download-artifact@v4
        with:
          name: feo-linux-x64
          path: dist/feo-linux-x64

      - name: Download linux-arm64
        uses: actions/download-artifact@v4
        with:
          name: feo-linux-arm64
          path: dist/feo-linux-arm64

      - name: Download darwin-x64
        uses: actions/download-artifact@v4
        with:
          name: feo-darwin-x64
          path: dist/feo-darwin-x64

      - name: Download darwin-arm64
        uses: actions/download-artifact@v4
        with:
          name: feo-darwin-arm64
          path: dist/feo-darwin-arm64

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/feo-linux-x64/feo-linux-x64
            dist/feo-linux-x64/feo-linux-x64.sha256
            dist/feo-linux-arm64/feo-linux-arm64
            dist/feo-linux-arm64/feo-linux-arm64.sha256
            dist/feo-darwin-x64/feo-darwin-x64
            dist/feo-darwin-x64/feo-darwin-x64.sha256
            dist/feo-darwin-arm64/feo-darwin-arm64
            dist/feo-darwin-arm64/feo-darwin-arm64.sha256
